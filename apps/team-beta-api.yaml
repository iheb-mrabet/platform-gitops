apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-beta-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iheb-mrabet/platform-gitops.git
    targetRevision: main
    path: platform/apps/team-beta-api
  destination:
    server: https://kubernetes.default.svc
    namespace: team-beta-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true